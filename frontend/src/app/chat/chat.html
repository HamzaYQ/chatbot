<!-- Page principale -->
<div class="h-screen bg-[#F7F9FC] flex flex-col">

  <!-- Header -->
  <header class="h-20 bg-white border-b border-[#DCE7F5] flex items-center px-8">

    <div>
      <h1 class="text-2xl font-bold text-[#1B3F91]">
        Sanlam Allianz
      </h1>

      <p class="text-sm text-gray-500">
        Assistant Assurance
      </p>
    </div>

  </header>


  <!-- Zone principale -->
  <main class="flex-1 flex flex-col overflow-hidden">

    <!-- Messages -->
    <div
      #messagesContainer
      class="flex-1 overflow-y-auto px-6 py-8"
    >

      <!-- Conteneur central type ChatGPT -->
      <div class="w-full max-w-3xl mx-auto space-y-6">

        @for (msg of messages(); track $index) {

          <div
            class="flex"
            [class.justify-end]="msg.role === 'user'"
            [class.justify-start]="msg.role === 'bot'"
          >

            <div
              class="max-w-[80%] px-5 py-3 rounded-2xl shadow-sm"
              [class.bg-[#0057B8]]="msg.role === 'user'"
              [class.text-white]="msg.role === 'user'"
              [class.bg-white]="msg.role === 'bot'"
              [class.text-gray-800]="msg.role === 'bot'"
              [class.border]="msg.role === 'bot'"
              [class.border-[#DCE7F5]]="msg.role === 'bot'"
            >

              @if (msg.role === 'bot') {

                <div
                  class="leading-relaxed"
                  [innerHTML]="msg.html"
                ></div>

              } @else {

                {{ msg.text }}

              }

            </div>

          </div>

        }


        <!-- Loading -->
        @if (loading()) {

          <div class="flex justify-start">

            <div class="flex gap-1.5 items-center px-3 py-3">

              <span
                class="w-2 h-2 bg-[#0057B8] rounded-full animate-bounce"
                style="animation-delay: 0ms"
              ></span>

              <span
                class="w-2 h-2 bg-[#0057B8] rounded-full animate-bounce"
                style="animation-delay: 150ms"
              ></span>

              <span
                class="w-2 h-2 bg-[#0057B8] rounded-full animate-bounce"
                style="animation-delay: 300ms"
              ></span>

            </div>

          </div>

        }


        <!-- Suggestions -->
        @if (suggestedActions().length > 0) {

          <div class="flex flex-wrap gap-3 pt-2">

            @for (action of suggestedActions(); track action.label) {

              <button
                (click)="sendSuggestion(action)"
                [disabled]="loading()"
                class="
                  bg-white
                  border
                  border-[#0057B8]
                  text-[#0057B8]
                  px-5
                  py-2.5
                  rounded-full
                  text-sm
                  font-medium
                  hover:bg-[#0057B8]
                  hover:text-white
                  transition
                  duration-300
                  shadow-sm
                  disabled:opacity-50
                  disabled:cursor-not-allowed
                "
              >

                {{ action.label }}

              </button>

            }

          </div>

        }

      </div>

    </div>


    <!-- Zone input -->
    <div class="bg-[#F7F9FC] px-6 pb-6 pt-3">

      <div class="w-full max-w-3xl mx-auto">

        <div
          class="
            flex
            items-center
            gap-3
            bg-white
            border
            border-[#DCE7F5]
            rounded-full
            px-5
            py-2
            shadow-sm
            focus-within:ring-2
            focus-within:ring-[#0057B8]
          "
        >

          <input
            [ngModel]="userInput()"
            (ngModelChange)="userInput.set($event)"
            (keyup.enter)="send()"
            [disabled]="loading()"
            placeholder="Posez votre question..."
            class="
              flex-1
              bg-transparent
              px-2
              py-3
              outline-none
              text-gray-800
              placeholder-gray-400
              disabled:cursor-not-allowed
            "
          >

          <button
            (click)="send()"
            [disabled]="loading()"
            class="
              bg-[#0057B8]
              hover:bg-[#1B3F91]
              text-white
              px-7
              py-3
              rounded-full
              transition
              duration-300
              font-medium
              disabled:opacity-50
              disabled:cursor-not-allowed
            "
          >

            Envoyer

          </button>

        </div>

      </div>

    </div>

  </main>

</div>
