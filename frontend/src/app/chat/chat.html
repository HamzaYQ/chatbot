<div class="min-h-screen bg-[#F7F9FC] flex items-center justify-center p-6">

  <!-- Main Card Container -->
  <div class="w-full max-w-5xl h-[90vh] bg-white rounded-3xl shadow-xl flex flex-col overflow-hidden">

    <!-- Header (with added padding and border) -->
    <div class="p-6 border-b border-[#DCE7F5]">
      <h1 class="text-2xl font-bold text-[#1B3F91]">
        Assistant Assurance
      </h1>
      <p class="text-sm text-gray-500">
        Sanlam Allianz
      </p>
    </div>

    <!-- Messages -->
    <div class="flex-1 overflow-y-auto px-8 py-6 space-y-5 bg-[#F7F9FC]">

      @for (msg of messages(); track $index) {
        <div
          class="max-w-[70%] px-5 py-3 rounded-2xl shadow-sm"
          [class.ml-auto]="msg.role === 'user'"
          [class.bg-[#0057B8]]="msg.role === 'user'"
          [class.text-white]="msg.role === 'user'"
          [class.mr-auto]="msg.role === 'bot'"
          [class.bg-white]="msg.role === 'bot'"
          [class.text-gray-800]="msg.role === 'bot'"
          [class.border]="msg.role === 'bot'"
          [class.border-[#DCE7F5]]="msg.role === 'bot'"
        >
          {{ msg.text }}
        </div>
      }

      @if (loading()) {
        <div
          class="mr-auto bg-white border border-[#DCE7F5] text-gray-500 px-5 py-3 rounded-2xl italic shadow-sm"
        >
          Le bot réfléchit...
        </div>
      }

    </div>

    <!-- Input -->
    <div class="bg-white border-t border-[#DCE7F5] p-5">
      <div class="flex gap-3">
        <input
          [ngModel]="userInput()"
          (ngModelChange)="userInput.set($event)"
          (keyup.enter)="send()"
          placeholder="Posez votre question..."
          class="flex-1 rounded-full border border-[#DCE7F5] px-6 py-3 focus:outline-none focus:ring-2 focus:ring-[#0057B8]"
        >
        <button
          (click)="send()"
          class="bg-[#0057B8] hover:bg-[#1B3F91] text-white px-8 py-3 rounded-full transition duration-300 font-medium"
        >
          Envoyer
        </button>
      </div>
    </div>

  </div> <!-- This correctly closes the Main Card Container -->

</div> <!-- This correctly closes the Outer Centered Wrapper -->
