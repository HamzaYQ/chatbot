<div class="h-screen bg-[#F7F9FC] flex items-center justify-center p-6 overflow-hidden">

  <div class="w-full max-w-5xl h-[90vh] bg-white rounded-3xl shadow-xl flex flex-col overflow-hidden">

    <!-- Header -->
    <div class="p-6 border-b border-[#DCE7F5] flex items-center justify-between">
      <div>
        <h1 class="text-2xl font-bold text-[#1B3F91]">
          Sanlam Allianz
        </h1>

        <p class="text-sm text-gray-500">
          Assistant Assurance
        </p>
      </div>
    </div>


    <!-- Messages -->
    <div
      #messagesContainer
      class="flex-1 overflow-y-auto px-8 py-6 space-y-5 bg-[#F7F9FC]"
    >

      @for (msg of messages(); track $index) {

        <div
          class="max-w-[70%] px-5 py-3 rounded-2xl shadow-sm"
          [class.ml-auto]="msg.role === 'user'"
          [class.bg-[#0057B8]]="msg.role === 'user'"
          [class.text-white]="msg.role === 'user'"
          [class.mr-auto]="msg.role === 'bot'"
          [class.bg-white]="msg.role === 'bot'"
          [class.text-gray-800]="msg.role === 'bot'"
          [class.border]="msg.role === 'bot'"
          [class.border-[#DCE7F5]]="msg.role === 'bot'"
        >

          @if (msg.role === 'bot') {

            <div
              class="leading-relaxed"
              [innerHTML]="msg.html"
            ></div>

          } @else {

            {{ msg.text }}

          }

        </div>

      }


      @if (loading()) {

        <div class="mr-auto flex gap-1.5 items-center px-2 py-3">

          <span
            class="w-2 h-2 bg-[#0057B8] rounded-full animate-bounce"
            style="animation-delay: 0ms"
          ></span>

          <span
            class="w-2 h-2 bg-[#0057B8] rounded-full animate-bounce"
            style="animation-delay: 150ms"
          ></span>

          <span
            class="w-2 h-2 bg-[#0057B8] rounded-full animate-bounce"
            style="animation-delay: 300ms"
          ></span>

        </div>

      }


      <!-- Suggestions sous le message -->
      @if (suggestedActions().length > 0) {

        <div class="flex flex-wrap gap-3 pt-2">

          @for (action of suggestedActions(); track action.label) {

            <button
              (click)="sendSuggestion(action)"
              [disabled]="loading()"
              class="
                bg-white
                border
                border-[#0057B8]
                text-[#0057B8]
                px-5
                py-2.5
                rounded-full
                text-sm
                font-medium
                hover:bg-[#0057B8]
                hover:text-white
                transition
                duration-300
                shadow-sm
                disabled:opacity-50
                disabled:cursor-not-allowed
              "
            >

              {{ action.label }}

            </button>

          }

        </div>

      }

    </div>


    <!-- Input -->
    <div class="bg-white p-5">

      <div class="flex gap-3">

        <input
          [ngModel]="userInput()"
          (ngModelChange)="userInput.set($event)"
          (keyup.enter)="send()"
          [disabled]="loading()"
          placeholder="Posez votre question..."
          class="
            flex-1
            rounded-full
            border
            border-[#DCE7F5]
            px-6
            py-3
            focus:outline-none
            focus:ring-2
            focus:ring-[#0057B8]
            disabled:bg-gray-100
            disabled:cursor-not-allowed
          "
        >

        <button
          (click)="send()"
          [disabled]="loading()"
          class="
            bg-[#0057B8]
            hover:bg-[#1B3F91]
            text-white
            px-8
            py-3
            rounded-full
            transition
            duration-300
            font-medium
            disabled:opacity-50
            disabled:cursor-not-allowed
          "
        >

          Envoyer

        </button>

      </div>

    </div>

  </div>

</div>
